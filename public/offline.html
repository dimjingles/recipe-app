<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrepTable — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fff7ed;
        color: #431407;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
      }
      .icon {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: #f97316;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
      }
      h1 { font-size: 1.5rem; font-weight: 700; color: #9a3412; }
      p { font-size: 1rem; color: #c2410c; max-width: 320px; line-height: 1.5; }
      button {
        margin-top: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: #f97316;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="icon">🍳</div>
    <h1>You're offline</h1>
    <p>Check your connection and try again — your recipes are waiting.</p>
    <button onclick="location.reload()">Retry</button>
  </body>
</html>
