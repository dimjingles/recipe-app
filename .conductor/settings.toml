"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"
file_include_globs = ".env.local\n"

[scripts]
setup = "npm install"
run_mode = "concurrent"

[scripts.run.dev]
command = "npm run dev -- --port $CONDUCTOR_PORT"
default = true
icon = "play"

[scripts.run.typecheck]
command = "npm run typecheck"
icon = "check"

[scripts.run.build]
command = "npm run build"
icon = "hammer"
